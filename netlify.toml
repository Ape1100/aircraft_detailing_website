[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  # edge-functions directory is auto-discovered at netlify/edge-functions/

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

# Edge function routing is configured via `export const config` in
# netlify/edge-functions/inject-og.ts rather than here.
